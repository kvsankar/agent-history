[pytest]
markers =
    integration: End-to-end integration tests without mocks (may touch filesystem/env)
    windows_only: Tests that should only run on Windows
    wsl_only: Tests that should only run in WSL
    linux_only: Tests that should only run on native Linux
    cross_boundary: Tests that traverse Windows/WSL boundary
    e2e_docker: Docker-based E2E tests with real SSH (run via docker-compose)
    v1: V1 minimal slice tests
    stats: Stats validation tests with deep calculation checking
    docker: Tests requiring Docker
    ssh: Tests requiring SSH
    slow: Tests taking > 10 seconds
testpaths =
    tests
python_files = test_*.py
