name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    name: Tests (py${{ matrix.python-version }} / ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.11", "3.12", "3.13"]
        include:
          # Also test on Windows and macOS with Python 3.11
          - os: windows-latest
            python-version: "3.11"
          - os: macos-latest
            python-version: "3.11"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Run tests
        env:
          # Isolate tests from user's actual agent data
          HOME: ${{ runner.temp }}/test-home
          USERPROFILE: ${{ runner.temp }}\test-home
          AGENT_HISTORY_CONFIG_DIR: ${{ runner.temp }}/test-config
        run: |
          # Run all tests (legacy tests have been deprecated and removed)
          uv run pytest -v --tb=short -x

  docker-e2e:
    name: Docker E2E Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker environment
        working-directory: docker
        run: docker compose build

      - name: Start SSH nodes
        working-directory: docker
        run: docker compose up -d node-alpha node-beta

      - name: Wait for nodes to be ready
        working-directory: docker
        run: |
          echo "Waiting for SSH nodes..."
          sleep 5
          # Verify SSH connectivity
          docker compose run --rm test-runner bash -c "ssh -o BatchMode=yes -o ConnectTimeout=10 alice@node-alpha echo 'node-alpha ready'"
          docker compose run --rm test-runner bash -c "ssh -o BatchMode=yes -o ConnectTimeout=10 charlie@node-beta echo 'node-beta ready'"

      - name: Run Docker E2E tests
        working-directory: docker
        run: docker compose run --rm test-runner pytest tests/e2e_docker/ -v

      - name: Cleanup
        if: always()
        working-directory: docker
        run: docker compose down -v
